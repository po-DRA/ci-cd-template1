name: Run tests

on:
  push:
  workflow_dispatch:  # allow manual trigger from GitHub Actions UI

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.9.4

      - name: Install dependencies
        run: pixi install

      # ── Flow 1: train the model so file-based tests are not skipped ──────────
      - name: Train model
        run: pixi run train

      # ── Flow 2 & 3: example-based + unit + E2E tests ─────────────────────────
      - name: Run tests
        run: pixi run test

      # ── Flow 4 (advanced): coverage — CI fails if coverage < 80% ─────────────
      # Students: comment out this step while learning the basics, then re-enable.
      - name: Check test coverage
        run: pixi run coverage
